services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: client-dashboard
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    restart: always
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dashboard-network:
    driver: bridge
