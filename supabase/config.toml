# Match the project in .env (VITE_SUPABASE_URL) so `supabase functions deploy` targets the same app.
project_id = "bdavazygbtoosegncfgi"

# Local `supabase start`: require email confirmation before sign-in.
# Hosted project: also enable Authentication → Providers → Email → Confirm email.
[auth.email]
enable_confirmations = true

[functions.customerio-proxy]
verify_jwt = false

# Gateway JWT checks can reject valid user sessions with publishable keys; we verify in validateAuth (JWKS).
[functions.ops-chat]
verify_jwt = false

[functions.sync-braze]
verify_jwt = false

[functions.braze-campaign-creative]
verify_jwt = false