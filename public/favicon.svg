<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BRCG">
  <!-- White outer pad so the tab reads clean at 16–32px -->
  <rect width="32" height="32" rx="9" fill="#ffffff"/>
  <rect x="1" y="1" width="30" height="30" rx="8" fill="none" stroke="#2563eb" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Brand blue tile -->
  <rect x="5" y="5.5" width="22" height="21" rx="5" fill="#2563eb"/>
  <text
    x="16"
    y="20.25"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="6.25"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-0.02em"
  >brcg.</text>
</svg>
